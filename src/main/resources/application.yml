spring:
  application:
    name: shipping-mini-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shipping}
    username: ${DB_USER:shipping}
    password: ${DB_PASSWORD:shipping}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
